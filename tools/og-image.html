  @font-face { font-family:'Source Serif 4'; src:url('../fonts/source-serif-4-latin-opsz.woff2') format('woff2'); font-weight:200 900; font-display:block; }
  @font-face { font-family:'Inter'; src:url('../fonts/inter-latin-wght.woff2') format('woff2'); font-weight:100 900; font-display:block; }
  @font-face { font-family:'JetBrains Mono'; src:url('../fonts/jetbrains-mono-latin-wght.woff2') format('woff2'); font-weight:100 800; font-display:block; }

  html, body { margin:0; padding:0; }
  .card {
    width:1200px; height:630px; box-sizing:border-box;
    background:#F7F2E8;
    background-image:
      radial-gradient(120% 120% at 50% -10%, rgba(196,93,56,0.06), transparent 55%),
      radial-gradient(100% 80% at 50% 120%, rgba(31,58,82,0.05), transparent 60%);
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    position:relative; overflow:hidden;
  }
  /* faint frame to read as a card */
  .card::after {
    content:''; position:absolute; inset:28px;
    border:1px solid rgba(31,58,82,0.10); border-radius:18px; pointer-events:none;
  }
  .mark { width:200px; height:137px; margin-bottom:30px; }
  .name {
    font-family:'Source Serif 4', serif; font-weight:600;
    font-size:88px; line-height:1; letter-spacing:-1px;
    color:#1F3A52; margin:0;
  }
  .rule { width:64px; height:4px; background:#C45D38; border-radius:2px; margin:26px 0; }
  .tag {
    font-family:'Inter', sans-serif; font-weight:400;
    font-size:30px; line-height:1.3; color:#496982; margin:0; text-align:center;
  }
  .url {
    position:absolute; bottom:54px;
    font-family:'JetBrains Mono', monospace; font-weight:500;
    font-size:22px; color:#7D94A8; letter-spacing:0.5px;
  }
</style>
